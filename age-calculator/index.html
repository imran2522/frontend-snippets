<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Age Calculator | Vanilla JS</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<main class="page">
			<section class="card" aria-labelledby="page-title">
				<header class="hero">
					<p class="eyebrow">Vanilla JavaScript Component</p>
					<h1 id="page-title">Age Calculator</h1>
					<p class="subtitle">
						Enter a birth date and optional target date to calculate exact age in years,
						months, and days.
					</p>
				</header>

				<form id="age-form" class="form" novalidate>
					<div class="field-group">
						<label for="birthDate">Date of Birth</label>
						<input id="birthDate" name="birthDate" type="date" required />
					</div>

					<div class="field-group">
						<label for="targetDate">Calculate Age On</label>
						<input id="targetDate" name="targetDate" type="date" />
					</div>

					<button type="submit" class="btn">Calculate Age</button>
					<p id="form-error" class="error" role="alert" aria-live="assertive"></p>
				</form>

				<section class="results" aria-live="polite" aria-atomic="true">
					<h2>Result</h2>
					<div class="stats" id="stats" hidden>
						<article class="stat-box">
							<p class="value" id="years">--</p>
							<p class="label">Years</p>
						</article>
						<article class="stat-box">
							<p class="value" id="months">--</p>
							<p class="label">Months</p>
						</article>
						<article class="stat-box">
							<p class="value" id="days">--</p>
							<p class="label">Days</p>
						</article>
					</div>
					<p class="details" id="details">Your age details will appear here.</p>
				</section>
			</section>
		</main>

		<script src="./script.js"></script>
	</body>
</html>
